<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Radar OSINT</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
}

header {
    background: #020617;
    padding: 20px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
}

.kpi {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
    text-align: center;
}

.kpi h2 {
    margin: 0;
    font-size: 30px;
}

.main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
}

img {
    width: 100%;
}
</style>

</head>

<body>

<header>
<h1>Radar OSINT</h1>
<p>Actualizado: 2026-03-29 14:54:46</p>
</header>

<!-- KPIs -->
<div class="grid">

<div class="kpi">
<h3>IPC</h3>
<h2>3.64</h2>
</div>

<div class="kpi">
<h3>Energía</h3>
<h2>137.85</h2>
</div>

<div class="kpi">
<h3>Alerta</h3>
<h2>MEDIUM</h2>
</div>

</div>

<!-- CONTENIDO -->
<div class="main">

<div>

<div class="card">
<h3>📊 Evolución IPC</h3>
<img src="ipc.png">
</div>

<div class="card">
<h3>⚡ Evolución Energía</h3>
<img src="energia.png">
</div>

</div>

<div>

<div class="card">
<h3>🧠 Interpretación</h3>
<p>
Inflación moderada con presión energética elevada.
</p>
</div>

<div class="card">
<h3>🚨 Evaluación</h3>
<p>
Sin tensiones críticas.
</p>
</div>

</div>

</div>

</body>
</html>
